- name: Configure desktop22 as a workstation
  hosts: localhost
  connection: local
  become: true
  force_handlers: true

  vars:
    user: sean
    uid: 1000
    gid: 1000

  roles:
    - role: core
    - role: docker
    - role: ansible_pull
    - role: dnf
    - role: btrfs
    - role: rpm_fusion
    - role: wifi
    - role: cli
    - role: fonts
    - role: onepassword
    - role: tailscale
    - role: nextdns
    - role: network_storage
    - role: libvirt
    - role: devops
    - role: nodejs
    - role: hyprland
    - role: niri
    - role: gui
    # - role: gaming

  tasks:
    # TODO: remove this task after it has run on all hosts
    - name: kcalc is removed
      ansible.builtin.package:
        name: kcalc
        state: absent

