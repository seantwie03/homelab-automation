- name: Configure desktop25 as a workstation
  hosts: localhost
  connection: local
  become: true
  force_handlers: true

  vars:
    user: sean
    uid: 1000
    gid: 1000

  roles:
    - role: ansible_pull
    - role: dnf
    - role: libvirt
    - role: btrfs
    - role: fonts
    - role: onepassword
    - role: rpm_fusion
    - role: tailscale
    - role: nextdns
    - role: nodejs
    - role: python
    - role: cli
    - role: ai
    - role: ai_health_monitor
    - role: network_storage
    - role: devops
    - role: gui
    - role: gaming

