---
- name: neovim and its dependencies are installed
  ansible.builtin.package:
    name:
      - neovim
      - wl-clipboard
    state: present

- name: neovim image support packages are installed
  ansible.builtin.package:
    name:
      - fd-find
      - ImageMagick
    state: present

- name: symlink nvim dotfiles directory
  ansible.builtin.file:
    src: "{{ dotfiles_path }}/nvim"
    dest: /home/{{ user }}/.config/nvim
    state: link
    follow: false
    owner: "{{ user }}"
    group: "{{ user }}"

