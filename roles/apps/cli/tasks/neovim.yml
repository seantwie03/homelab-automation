---
- name: neovim and its dependencies are installed
  ansible.builtin.dnf:
    name:
      - neovim
      - inotify-tools
      - ripgrep
      - tree-sitter-cli
      - wl-clipboard
      - xsel
    state: present
    install_weak_deps: false

- name: neovim image support packages are installed
  ansible.builtin.package:
    name:
      - fd-find
      - ImageMagick
    state: present

- name: vim-enhanced is absent
  ansible.builtin.package:
    name: vim-enhanced
    state: absent

- name: vim is symlinked to nvim
  ansible.builtin.file:
    src: /usr/bin/nvim
    dest: /usr/local/bin/vim
    state: link

- name: symlink nvim dotfiles directory
  ansible.builtin.file:
    src: "{{ dotfiles_path }}/nvim"
    dest: /home/{{ user }}/.config/nvim
    state: link
    follow: false
    owner: "{{ user }}"
    group: "{{ user }}"
