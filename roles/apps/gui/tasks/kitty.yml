---
- name: kitty is installed
  ansible.builtin.package:
    name: kitty
    state: present

- name: symlink kitty dotfiles directory
  ansible.builtin.file:
    src: "{{ dotfiles_path }}/kitty"
    dest: /home/{{ user }}/.config/kitty
    state: link
    follow: false
    owner: "{{ user }}"
    group: "{{ user }}"

- name: symlink machine-specific kitty config
  ansible.builtin.file:
    src: "{{ dotfiles_path }}/kitty/{{ ansible_facts['hostname'] }}.conf"
    dest: "{{ dotfiles_path }}/kitty/machine-specific.conf"
    state: link
    follow: false
    owner: "{{ user }}"
    group: "{{ user }}"

