---
# Some GUI programs are configured to autostart using ~/.config/autostart
- name: autostart directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/.config/autostart
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755

- name: firefox flatpak is installed
  community.general.flatpak:
    name: org.mozilla.firefox

- name: google-chrome is installed
  ansible.builtin.include_tasks: google_chrome.yml

- name: kitty is installed and configured
  ansible.builtin.include_tasks: kitty.yml

- name: emacs is installed and configured
  ansible.builtin.include_tasks: emacs.yml

# Temporarily remove Zoom until its RPM signature is compatible with RPM 6.
# - name: zoom is installed
#   ansible.builtin.include_tasks: zoom.yml

- name: vscode and vscode-insiders are installed
  ansible.builtin.include_tasks: vscode.yml

- name: jetbrains toolbox is installed
  ansible.builtin.include_tasks: jetbrains_toolbox.yml

- name: printer packages are installed
  ansible.builtin.include_tasks: printer.yml

- name: mouse configuration software is installed
  ansible.builtin.package:
    name: piper
    state: present

- name: bittorrent client is installed
  ansible.builtin.package:
    name: qbittorrent
    state: present

- name: inkscape is installed
  ansible.builtin.package:
    name:
      - inkscape
      - colord-gtk

- name: mpv is installed
  ansible.builtin.package:
    name: mpv
    state: present

- name: mpv dotfiles directory is symlinked
  ansible.builtin.file:
    src: "{{ dotfiles_path }}/mpv"
    dest: /home/{{ user }}/.config/mpv
    state: link
    follow: false
    owner: "{{ user }}"
    group: "{{ user }}"
