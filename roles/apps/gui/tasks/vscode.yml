---
- name: configure vscode repository
  block:
    - name: vscode repository key file is installed
      ansible.builtin.copy:
        src: microsoft.asc
        dest: /etc/pki/rpm-gpg/RPM-GPG-KEY-microsoft
        owner: root
        group: root
        mode: 0644

    - name: vscode repository key is installed
      ansible.builtin.rpm_key:
        key: /etc/pki/rpm-gpg/RPM-GPG-KEY-microsoft
        fingerprint: bc528686b50d79e339d3721ceb3e94adbe1229cf
        state: present

    - name: vscode repository is enabled
      ansible.builtin.yum_repository:
        name: vscode
        description: Visual Studio Code
        baseurl: https://packages.microsoft.com/yumrepos/vscode
        enabled: true
        gpgcheck: true
        repo_gpgcheck: true
        gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-microsoft
        skip_if_unavailable: true

- name: vscode is installed
  ansible.builtin.package:
    name: code
    state: present

- name: vscode-insiders is installed
  ansible.builtin.package:
    name: code-insiders
    state: present
