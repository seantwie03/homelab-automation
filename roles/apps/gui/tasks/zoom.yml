---
- name: zoom-us repository key is installed
  ansible.builtin.rpm_key:
    key: https://zoom.us/linux/download/pubkey?version=6-7-5
    # To find fingerprint
    #     Go to https://zoom.us/download?os=linux
    #     Download signing key
    #     Run gpg --show-keys --fingerprint package-signing-key.pub
    fingerprint: 84C365D6CC9A4886CA926BCC4F2197399706AC24
    state: present
  register: zoom_repository_key
  retries: 3
  delay: 10
  until: zoom_repository_key is succeeded

- name: installed packages are gathered
  ansible.builtin.package_facts:
    manager: rpm

- name: zoom is installed
  ansible.builtin.package:
    name: https://zoom.us/client/{{ zoom_version }}/zoom_x86_64.rpm
    state: present
  register: zoom_package
  retries: 3
  delay: 10
  until: zoom_package is succeeded
  when: >-
    'zoom' not in ansible_facts.packages
    or ansible_facts.packages.zoom[0].version != zoom_version
