---
- name: 1password repository is configured
  block:
    - name: 1password repository key file is installed
      ansible.builtin.copy:
        src: 1password.asc
        dest: /etc/pki/rpm-gpg/RPM-GPG-KEY-1password
        owner: root
        group: root
        mode: 0644

    - name: 1password repository key is installed
      ansible.builtin.rpm_key:
        key: /etc/pki/rpm-gpg/RPM-GPG-KEY-1password
        fingerprint: 3fef9748469adbe15da7ca80ac2d62742012ea22
        state: present

    - name: 1password repository is enabled
      ansible.builtin.yum_repository:
        name: 1password
        description: 1Password Stable Channel
        baseurl: https://downloads.1password.com/linux/rpm/stable/$basearch/
        enabled: true
        gpgcheck: true
        repo_gpgcheck: true
        gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-1password
        skip_if_unavailable: true

- name: 1password CLI is installed
  ansible.builtin.package:
    name: 1password-cli
    state: present

- name: 1password GUI is installed
  ansible.builtin.include_tasks: gui.yml
  when: is_graphical_system

