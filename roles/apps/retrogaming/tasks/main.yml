---
- name: "{{ user }} user exists and is in the required groups"
  ansible.builtin.user:
    name: "{{ user }}"
    shell: /bin/bash
    create_home: true
    state: present
    groups: games,video,input,pkg-build
    append: true

- name: cage, xwayland, and kanshi are installed
  ansible.builtin.package:
    name:
      - cage
      - xorg-x11-server-Xwayland
      - kanshi
    state: present

- name: kanshi config directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/.config/kanshi
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755

- name: kanshi is configured
  ansible.builtin.template:
    src: kanshi_config.j2
    dest: /home/{{ user }}/.config/kanshi/config
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0644

- name: esde startup script is configured
  ansible.builtin.template:
    src: esde_start.sh.j2
    dest: /opt/esde_start.sh
    owner: root
    group: root
    mode: 0755

- name: cage session is configured in .bash_profile
  ansible.builtin.blockinfile:
    path: /home/{{ user }}/.bash_profile
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0644
    marker: "# {mark} ANSIBLE MANAGED BLOCK: retrogaming autostart"
    block: |
      if [ -z "$WAYLAND_DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          exec cage -- /opt/esde_start.sh
      fi

- name: "es-de {{ emulationstation_version }} appimage stat"
  ansible.builtin.stat:
    path: /opt/ES-DE_{{ emulationstation_version }}_x64.AppImage
  register: esde_appimage

- name: "es-de {{ emulationstation_version }} appimage is downloaded"
  ansible.builtin.get_url:
    url: https://gitlab.com/api/v4/projects/es-de%2Femulationstation-de/packages/generic/ES-DE_Stable/{{ emulationstation_version }}/ES-DE_x64.AppImage
    dest: /opt/ES-DE_{{ emulationstation_version }}_x64.AppImage
    mode: 0755
    owner: root
    group: root
  when: not esde_appimage.stat.exists

- name: es-de directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/ES-DE
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755

- name: es-de settings directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/ES-DE/settings
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755

- name: es-de settings are configured
  ansible.builtin.template:
    src: es_settings.xml.j2
    dest: /home/{{ user }}/ES-DE/settings/es_settings.xml
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0644

- name: retroarch config directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/.config/retroarch
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755

- name: retroarch mupen64plus-next core options directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/.config/retroarch/config/Mupen64Plus-Next
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755

- name: mupen64plus-next rdp plugin is parallel
  ansible.builtin.lineinfile:
    path: /home/{{ user }}/.config/retroarch/config/Mupen64Plus-Next/Mupen64Plus-Next.opt
    regexp: ^mupen64plus-rdp-plugin =
    line: mupen64plus-rdp-plugin = "parallel"
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0644

- name: retroarch is configured
  ansible.builtin.template:
    src: retroarch.cfg.j2
    dest: /home/{{ user }}/.config/retroarch/retroarch.cfg
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0644

- name: kernel-modules-extra is installed for controller support
  ansible.builtin.package:
    name: kernel-modules-extra
    state: present

- name: retroarch and mame-tools are installed
  ansible.builtin.package:
    name:
      - retroarch
      - mame-tools
    state: present

- name: retroarch cores {{ retroarch_cores_version }} archive stat
  ansible.builtin.stat:
    path: /opt/RetroArch_cores_{{ retroarch_cores_version }}.7z
  register: retroarch_cores_archive

- name: retroarch cores {{ retroarch_cores_version }} archive is downloaded
  ansible.builtin.get_url:
    url: https://buildbot.libretro.com/stable/{{ retroarch_cores_version }}/linux/x86_64/RetroArch_cores.7z
    dest: /opt/RetroArch_cores_{{ retroarch_cores_version }}.7z
    mode: 0644
    owner: root
    group: root
  when: not retroarch_cores_archive.stat.exists

- name: retroarch cores are extracted
  ansible.builtin.command:
    argv:
      - 7za
      - e
      - /opt/RetroArch_cores_{{ retroarch_cores_version }}.7z
      - -o/usr/lib64/libretro/
      - -y
  when: not retroarch_cores_archive.stat.exists

- name: es-de downloaded_media is symlinked to emulation media path
  ansible.builtin.file:
    src: "{{ emulation_media_path }}"
    dest: /home/{{ user }}/ES-DE/downloaded_media
    state: link
    owner: "{{ user }}"
    group: "{{ user }}"
  when: emulation_media_path != '/home/' ~ user ~ '/ES-DE/downloaded_media'

- name: es-de gamelist directories exist
  ansible.builtin.file:
    path: /home/{{ user }}/ES-DE/gamelists/{{ item }}
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755
  loop:
    - atari2600
    - gb
    - gba
    - gbc
    - gamegear
    - genesis
    - n64
    - nds
    - neogeo
    - nes
    - psp
    - psx
    - sega32x
    - snes

- name: gamelist symlinks exist
  ansible.builtin.file:
    src: "{{ emulation_roms_path }}/{{ item }}/gamelist.xml"
    dest: /home/{{ user }}/ES-DE/gamelists/{{ item }}/gamelist.xml
    state: link
    owner: "{{ user }}"
    group: "{{ user }}"
  loop:
    - atari2600
    - gb
    - gba
    - gbc
    - gamegear
    - genesis
    - n64
    - nds
    - neogeo
    - nes
    - psp
    - psx
    - sega32x
    - snes

- name: xone copr is enabled
  community.general.copr:
    name: jackgreiner/xone-git
    state: enabled

- name: xone wireless controller driver is installed
  ansible.builtin.package:
    name:
      - xone
      - lpf-xone-firmware
    state: present
  notify: xone firmware is approved

