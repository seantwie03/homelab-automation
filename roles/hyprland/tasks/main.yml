---
- name: Symlink dotfiles/hypr to ~/.config/hypr
  ansible.builtin.file:
    src: "{{ dotfiles_path }}/hypr"
    dest: "/home/{{ user }}/.config/hypr"
    state: link
    follow: false
    owner: "{{ user }}"
    group: "{{ user }}"

- name: symlink for machine-specific.conf exists
  ansible.builtin.file:
    src: "/home/{{ user }}/.config/hypr/{{ ansible_facts['hostname'] }}.conf"
    dest: "/home/{{ user }}/.config/hypr/machine-specific.conf"
    state: link
    follow: false

- name: enable solopasha/hyprland copr
  community.general.copr:
    name: lionheartp/Hyprland
    state: enabled

- name: hyprland is installed
  ansible.builtin.package:
    name:
      - hyprland
      - hyprland-guiutils
    state: present

- name: hyprpaper is installed
  ansible.builtin.package:
    name: hyprpaper
    state: present

- name: hypridle is installed
  ansible.builtin.package:
    name: hypridle
    state: present

- name: pavucontrol is installed
  ansible.builtin.package:
    name: pavucontrol
    state: present

- name: wofi is installed and configured
  ansible.builtin.include_tasks: wofi.yml

- name: screenshot tool dependencies are installed
  ansible.builtin.package:
    name:
      - grim
      - slurp
      - cargo
      - gtk4-devel
      - libadwaita-devel
      - glib2-devel
      - pango-devel
      - gdk-pixbuf2-devel
      - fontconfig-devel
      - libepoxy-devel
    state: present

- name: satty is installed from cargo
  community.general.cargo:
    name: satty
    state: present
    path: "/home/{{ user }}"

- name: satty is executable
  ansible.builtin.file:
    path: /home/{{ user }}/bin/satty
    mode: 0550
    owner: "{{ user }}"
    group: "{{ user }}"

- name: autostart usws selector
  blockinfile:
    path: "/home/{{ user }}/.bash_profile"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0644
    marker: "# {mark} ANSIBLE MANAGED BLOCK: autostart uswm select"
    block: |
      if uwsm check may-start && uwsm select; then
          exec uwsm start default
      fi

