---
- name: install prerequisites
  ansible.builtin.package:
    name:
      - "@c-development"
      - "@development-tools"

- name: configure virtualbox repository
  block:
    - name: virtualbox repository key file is installed
      ansible.builtin.copy:
        src: oracle_vbox_2016.asc
        dest: /etc/pki/rpm-gpg/RPM-GPG-KEY-virtualbox
        owner: root
        group: root
        mode: 0644

    - name: virtualbox repository key is installed
      ansible.builtin.rpm_key:
        key: /etc/pki/rpm-gpg/RPM-GPG-KEY-virtualbox
        fingerprint: B9F8 D658 297A F3EF C18D  5CDF A2F6 83C5 2980 AECF
        state: present

    - name: virtualbox repository is enabled
      ansible.builtin.yum_repository:
        name: virtualbox
        description: Fedora $releasever - $basearch - VirtualBox
        baseurl: http://download.virtualbox.org/virtualbox/rpm/fedora/$releasever/$basearch
        enabled: true
        gpgcheck: true
        repo_gpgcheck: true
        gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-virtualbox
        skip_if_unavailable: true

- name: virtualbox is installed
  ansible.builtin.package:
    name: VirtualBox-7.2
    state: present

- name: user {{ user }} is in vboxusers group
  ansible.builtin.user:
    name: "{{ user }}"
    groups: vboxusers
    append: true
