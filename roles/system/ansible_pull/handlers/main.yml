---
- name: restart ansible-pull timer
  ansible.builtin.systemd_service:
    name: ansible-pull.timer
    state: restarted
    daemon_reload: true

- name: dnf-automatic timer is started and enabled
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started
    daemon_reload: true
  changed_when: true

- name: restart dnf-automatic timer
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    state: restarted
    daemon_reload: true
  changed_when: true
