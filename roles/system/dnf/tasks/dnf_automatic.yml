---
- name: dnf-automatic is installed
  ansible.builtin.package:
    name:
      - dnf5-plugin-automatic
      - libnotify
    state: present

- name: dnf-automatic-notify script is deployed
  ansible.builtin.template:
    src: dnf-automatic-notify.sh.j2
    dest: /usr/local/bin/dnf-automatic-notify.sh
    owner: root
    group: root
    mode: 0755

- name: dnf-automatic is configured
  ansible.builtin.template:
    src: automatic.conf.j2
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: 0644
  notify: restart dnf5-automatic timer

- name: dnf5-automatic.timer override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/dnf5-automatic.timer.d
    state: directory
    owner: root
    group: root
    mode: 0755

- name: dnf5-automatic.timer randomized delay is disabled
  ansible.builtin.copy:
    src: dnf5-automatic-timer-override.conf
    dest: /etc/systemd/system/dnf5-automatic.timer.d/override.conf
    owner: root
    group: root
    mode: 0644
  notify: restart dnf5-automatic timer

- name: dnf5-automatic.service override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/dnf5-automatic.service.d
    state: directory
    owner: root
    group: root
    mode: 0755

- name: dnf5-automatic.service is after ansible-pull and snapshotted
  ansible.builtin.copy:
    src: dnf5-automatic-service-override.conf
    dest: /etc/systemd/system/dnf5-automatic.service.d/override.conf
    owner: root
    group: root
    mode: 0644
  notify: restart dnf5-automatic timer

- name: legacy dnf-automatic override directories are absent
  ansible.builtin.file:
    path: /etc/systemd/system/{{ item }}
    state: absent
  loop:
    - dnf-automatic.timer.d
    - dnf-automatic.service.d

- name: systemd daemon is reloaded
  ansible.builtin.systemd:
    daemon_reload: true
  changed_when: false

- name: dnf5-automatic.timer is enabled and started
  ansible.builtin.service:
    name: dnf5-automatic.timer
    enabled: true
    state: started
