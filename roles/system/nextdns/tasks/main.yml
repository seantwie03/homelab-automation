---
- name: /etc/NetworkManager/conf.d directory exists
  ansible.builtin.file:
    path: /etc/NetworkManager/conf.d
    state: directory
    owner: root
    group: root
    mode: 0755

- name: networkmanager dns management is disabled
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/dns.conf
    content: |
      [main]
      dns=none
    owner: root
    group: root
    mode: 0644
  notify: restart networkmanager

- name: /etc/systemd/resolved.conf.d directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: 0755

- name: systemd-resolved is configured to use nextdns dot
  ansible.builtin.template:
    src: nextdns.conf.j2
    dest: /etc/systemd/resolved.conf.d/nextdns.conf
    owner: root
    group: root
    mode: 0644
  notify: restart systemd-resolved

- name: systemd-resolved is enabled and started
  ansible.builtin.service:
    name: systemd-resolved
    enabled: true
    state: started

- name: /etc/resolv.conf is linked to systemd-resolved stub
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true

- name: wait-dns-online.sh is deployed
  ansible.builtin.copy:
    src: wait-dns-online.sh
    dest: /usr/local/bin/wait-dns-online.sh
    owner: root
    group: root
    mode: 0755

- name: dns-online.service is deployed
  ansible.builtin.copy:
    src: dns-online.service
    dest: /etc/systemd/system/dns-online.service
    owner: root
    group: root
    mode: 0644

- name: systemd daemon is reloaded
  ansible.builtin.systemd:
    daemon_reload: true
  changed_when: false
