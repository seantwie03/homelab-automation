---
- name: configure tailscale repository
  block:
    - name: tailscale repository key is installed
      ansible.builtin.rpm_key:
        key: https://pkgs.tailscale.com/stable/fedora/repo.gpg
        fingerprint: 2596a99eaab33821893c0a79458ca832957f5868
        state: present

    - name: tailscale repository is enabled
      ansible.builtin.yum_repository:
        name: tailscale-stable
        description: Tailscale stable
        baseurl: https://pkgs.tailscale.com/stable/fedora/$basearch/
        enabled: true
        gpgcheck: true
        repo_gpgcheck: true
        gpgkey: https://pkgs.tailscale.com/stable/fedora/repo.gpg
        skip_if_unavailable: true

- name: tailscale is installed
  ansible.builtin.package:
    name: tailscale
    state: present
  notify: tailscale install instructions

- name: tailscaled service is enabled and started
  ansible.builtin.service:
    name: tailscaled.service
    state: started
    enabled: true

- name: ipv4 forwarding is enabled
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: true
  when: tailscale_subnet_routes | length > 0

- name: ipv6 forwarding is enabled
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: true
  when: tailscale_subnet_routes | length > 0

- name: tailscale subnet routes are advertised
  ansible.builtin.command: tailscale set --advertise-routes={{ tailscale_subnet_routes | join(',') }}
  changed_when: false
  when: tailscale_subnet_routes | length > 0

- name: tailscale exit node advertising is configured
  ansible.builtin.command: >-
    tailscale set {{ '--advertise-exit-node' if tailscale_advertise_exit_node else '--advertise-exit-node=false' }}
  changed_when: false

- name: tailscale route acceptance is configured
  ansible.builtin.command: >-
    tailscale set {{ '--accept-routes' if tailscale_accept_routes else '--accept-routes=false' }}
  changed_when: false
