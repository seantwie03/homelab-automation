---
- name: niri_window_buttons is compiled
  ansible.builtin.command:
    cmd: cargo build --release --locked
    chdir: /home/{{ user }}/.local/src/niri_window_buttons
  become: true
  become_user: "{{ user }}"
  listen: niri_window_buttons source changed
  changed_when: true

- name: libniri_window_buttons.so is installed to waybar plugin path
  ansible.builtin.copy:
    src: /home/{{ user }}/.local/src/niri_window_buttons/target/release/libniri_window_buttons.so
    dest: /usr/lib/waybar/libniri_window_buttons.so
    mode: 0755
  listen: niri_window_buttons source changed

- name: restart xdg-desktop-portal
  ansible.builtin.systemd:
    name: xdg-desktop-portal.service
    state: restarted
    scope: user
  become: true
  become_user: "{{ user }}"

