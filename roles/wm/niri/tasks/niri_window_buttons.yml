---
- name: niri_window_buttons build dependencies are installed
  ansible.builtin.package:
    name:
      - glib2-devel
      - gtk3-devel
    state: present

- name: /home/{{ user }}/.local/src directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/.local/src
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755

- name: niri_window_buttons source is present
  ansible.builtin.git:
    repo: https://github.com/adelmonte/niri_window_buttons.git
    dest: /home/{{ user }}/.local/src/niri_window_buttons
    version: "{{ niri_window_buttons_version }}"
  become: true
  become_user: "{{ user }}"
  notify: niri_window_buttons source changed

- name: /usr/lib/waybar exists for cffi plugins
  ansible.builtin.file:
    path: /usr/lib/waybar
    state: directory
    mode: 0755
